---

- name: Bootstrap base OS and runtime
  hosts: all:!local
  gather_facts: true
  become: true
  roles:
    - {role: general, tags: ["bootstrap", "general"]}

- name: Deploy companyx nginx only on application hosts
  hosts: application_companyx_lb
  gather_facts: true
  become: true
  roles:
    - { role: nginx, tags: ["nginx"]}
