---
# Applied to all hosts in the aws_ec2 dynamic-inventory group (not localhost).
# Connection vars belong here — the aws_ec2 plugin YAML does not support a top-level `vars:` key.
ansible_connection: aws_ssm

# Aligns with default SSM Session Manager user on Amazon Linux (see README).
ansible_user: ssm-user

ansible_become: true
ansible_become_user: root
ansible_become_method: sudo

ansible_aws_ssm_timeout: 120
ansible_aws_ssm_s3_addressing_style: virtual

# REQUIRED for amazon.aws.aws_ssm (module payloads go via S3)
ansible_aws_ssm_bucket_name: "phrase-infra-ansible-ssm-staging"
