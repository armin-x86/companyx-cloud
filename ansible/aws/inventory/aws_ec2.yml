---
plugin: amazon.aws.aws_ec2
regions:
  - eu-west-1

# keyed_groups may be used to create custom groups
strict: False

hostnames: tag:Name
# https://docs.ansible.com/ansible/latest/collections/amazon/aws/docsite/aws_ec2_guide.html#keyed-groups
keyed_groups:
  - key: ec2_tags['business-unit']
    prefix: business_unit
  - key: ec2_tags['ateimouri.com/application']
    prefix: application
  - key: placement.region
    prefix: aws_region

# creates and modifies host variables
# https://docs.ansible.com/ansible/latest/collections/amazon/aws/docsite/aws_ec2_guide.html#compose
compose:
  # aws_ssm uses the instance id as ansible_host (no public IP in private subnets).
  ansible_host: instance_id
  aws_region: placement.region
  ansible_aws_ssm_region: placement.region
  public_ip: public_ip_address
  private_ip: private_ip_address
  instance_name: ec2_tags['Name']
