---
- name: Nginx | Validate Podman prerequisites
  tags: ["nginx", "container"]
  block:
    - name: Nginx | Require Podman runtime for this role
      ansible.builtin.assert:
        that:
          - nginx_container_runtime == 'podman'
        fail_msg: Nginx role supports Podman only.

    - name: Nginx | Ensure Podman binary exists
      ansible.builtin.command:
        argv:
          - podman
          - --version
      changed_when: false

- name: Nginx | Deploy companyx nginx config and container
  tags: ["nginx", "container"]
  block:
    - name: Nginx | Create directory for nginx bind mount
      ansible.builtin.file:
        path: "{{ nginx_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Nginx | Render default vhost for companyx endpoint
      ansible.builtin.template:
        src: nginx-default.conf.j2
        dest: "{{ nginx_config_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: Nginx | Restart container

    - name: Nginx | Run unprivileged nginx container on host port 80
      containers.podman.podman_container:
        name: "{{ nginx_container_name }}"
        image: "{{ nginx_image }}"
        state: started
        restart_policy: always
        pull: "{{ nginx_image_pull_policy }}"
        systemd: "true"
        ports:
          - "80:8080"
        volumes:
          - "{{ nginx_config_path }}:/etc/nginx/conf.d/default.conf:ro,Z"
