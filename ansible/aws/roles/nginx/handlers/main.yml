---
- name: Nginx | Restart container
  containers.podman.podman_container:
    name: "{{ nginx_container_name }}"
    image: "{{ nginx_image }}"
    state: started
    restart: true
    restart_policy: always
    pull: "{{ nginx_image_pull_policy }}"
    systemd: "true"
    ports:
      - "80:8080"
    volumes:
      - "{{ nginx_config_path }}:/etc/nginx/conf.d/default.conf:ro,Z"
